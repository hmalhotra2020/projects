version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: shared-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: shared-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

  postgres:
    image: postgres:16-alpine
    container_name: shared-postgres
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpass
      POSTGRES_DB: pumpsdb
    ports:
      - "5432:5432"
    volumes:
      - shared_postgres_data:/var/lib/postgresql/data

  pumps-analyzer-app:
    build:
      context: ./pumps-analyzer-app
      dockerfile: Dockerfile
    container_name: pumps-analyzer-app
    depends_on:
      - kafka
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pumpsdb
      SPRING_DATASOURCE_USERNAME: pguser
      SPRING_DATASOURCE_PASSWORD: pgpass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SIMULATOR_TICK_TIME: 5000
      SIMULATOR_HITS_PER_TICK: 5
    restart: on-failure

  spark-processor:
    build:
      context: ./kafka-spark-processor
      dockerfile: Dockerfile
    container_name: spark-processor
    depends_on:
      - kafka
      - postgres
      - pumps-analyzer-app
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      POSTGRES_URL: jdbc:postgresql://postgres:5432/pumpsdb
      POSTGRES_USER: pguser
      POSTGRES_PASS: pgpass
    restart: on-failure

volumes:
  shared_postgres_data:
