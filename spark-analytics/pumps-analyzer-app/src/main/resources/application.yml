spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pumpsdb}
    username: ${SPRING_DATASOURCE_USERNAME:pguser}
    password: ${SPRING_DATASOURCE_PASSWORD:pgpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: pumps-analyzer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

simulator:
  tick-time: 5000
  hits-per-tick: 10
  no-pumps: 10
  pump-capacity: 4

city:
  names: Mumbai,Delhi,Bangalore,Hyderabad,Ahmedabad,Chennai,Kolkata,Surat,Pune,Jaipur,Lucknow,Kanpur,Nagpur,Indore,Thane,Bhopal,Visakhapatnam,Patna,Vadodara,Ghaziabad

logging:
  level:
    com.example.pumps: INFO
    org.springframework.kafka: WARN
    org.hibernate: WARN
